<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal | HRFlow Authentication</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.gstatic.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com http://localhost:3000 http://127.0.0.1:3000 https://unpkg.com https://cdn.jsdelivr.net; frame-src 'self' https://planning-with-ai-c026b.firebaseapp.com https://apis.google.com;">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --card: #ffffff;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .auth-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
        }

        .logo-section { text-align: center; margin-bottom: 2rem; }
        .logo-icon {
            width: 54px; height: 54px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; color: white;
            margin-bottom: 1rem; box-shadow: 0 10px 15px rgba(99, 102, 241, 0.3);
        }
        .logo-section h1 { font-size: 1.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
        .logo-section p { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; color: var(--text-main); }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; }
        .input-wrapper input {
            width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px; border: 1px solid var(--border);
            outline: none; font-family: inherit; transition: 0.2s; font-size: 0.95rem;
        }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: inherit; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3); }

        .error-message { background: #fff1f2; color: #e11d48; padding: 12px; border-radius: 10px; font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border: 1px solid #fda4af; text-align: center; }

        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; transition: 0.2s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <div class="logo-icon"><i data-lucide="briefcase"></i></div>
                <h1>Manager Login</h1>
                <p>Sign in to access your dashboard</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" name="email" placeholder="manager@hrflow.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a href="#" id="forgotBtn" style="font-size: 0.75rem; color: var(--primary); text-decoration: none; font-weight: 600;">Forgot?</a>
                    </div>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Enter Dashboard</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <div style="text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem;">
                Restricted Access: Authorized Personnel Only
            </div>
        </div>
    </div>

    <!-- Custom Alert Overlay -->
    <div id="customOverlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.4); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:9999;">
        <div id="alertCard" style="background:white; padding:2.5rem; border-radius:24px; width:90%; max-width:400px; text-align:center; border:1px solid #dbeafe; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); transition: all 0.3s ease;">
            <div id="alertIcon" style="font-size:2.5rem; color:#6366f1; margin-bottom:1.5rem;"></div>
            <h2 id="alertTitle" style="font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; color:#0f172a;">Notification</h2>
            <p id="alertMsg" style="color:#64748b; margin-bottom:2rem; line-height:1.6;"></p>
            <button id="alertBtn" onclick="document.getElementById('customOverlay').style.display='none'" style="background:#6366f1; color:white; width:100%; padding:1rem; border:none; border-radius:12px; font-weight:700; cursor:pointer; transition:0.2s;">Understood</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const errorEl = document.getElementById('errorMessage');

        // Forgot Password
        document.getElementById('forgotBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            showAlert('Security Protocol', 'A recovery request has been sent to your Departmental Head. Please contact your team manager for immediate verification.', 'lock');
        });

        window.showAlert = function(title, msg, icon='circle-info', type='info') {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMsg').textContent = msg;
            const iconEl = document.getElementById('alertIcon');
            const btnEl = document.getElementById('alertBtn');
            const cardEl = document.getElementById('alertCard');
            
            iconEl.innerHTML = `<i data-lucide="${icon}"></i>`;
            
            if (type === 'error' || title.toLowerCase().includes('denied') || title.toLowerCase().includes('restricted')) {
                iconEl.style.color = '#ef4444';
                btnEl.style.background = '#ef4444';
                cardEl.style.borderTop = '6px solid #ef4444';
            } else {
                iconEl.style.color = '#6366f1';
                btnEl.style.background = '#6366f1';
                cardEl.style.borderTop = 'none';
            }
            
            if (window.lucide) if (window.lucide) { lucide.createIcons(); } else { console.error("Lucide failed to load"); }
            document.getElementById('customOverlay').style.display = 'flex';
        };

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const { email, password } = Object.fromEntries(formData.entries());
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.querySelector('span').textContent = 'Authenticating...';
            errorEl.style.display = 'none';

            try {
                // ===== AUTHENTICATION STRATEGY: 1. BACKEND API (NEW) -> 2. REAL FIREBASE -> 3. DEMO BYPASS =====
                let userData = null;
                let userAuth = null;

                // --- STEP 1: Attempt Backend API Login ---
                try {
                    console.log('Attempting Backend API login...');
                    const response = await fetch('http://localhost:3000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: password })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        console.log('✅ Backend API login successful');
                        userData = data.user;
                        userData.uid = data.user.id;
                        if (data.accessToken) localStorage.setItem('hr_access_token', data.accessToken);
                    }
                } catch (apiErr) {
                    console.warn('Backend API unavailable, falling back to client-side Firebase...', apiErr.message);
                }

                // --- STEP 2: Client-side Firebase Fallback ---
                if (!userData) {
                    try {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        userAuth = userCredential.user;
                        const userSnap = await getDoc(doc(db, 'users', userAuth.uid));
                        if (userSnap.exists()) userData = userSnap.data();
                    } catch (firebaseErr) {
                        console.warn('Firebase Auth failed, attempting direct Firestore query...', firebaseErr.code);
                        
                        // FALLBACK: Search for user in Firestore
                        try {
                            const q = query(collection(db, 'users'), where('email', '==', email.toLowerCase()));
                            const querySnap = await getDocs(q);
                            
                            if (!querySnap.empty) {
                                const potentialUser = querySnap.docs[0].data();
                                if (potentialUser.tempPassword === password || potentialUser.password === password) {
                                    userData = potentialUser;
                                    userData.uid = querySnap.docs[0].id;
                                    console.log('✅ Direct Firestore lookup successful');
                                }
                            }
                        } catch (permErr) {
                            console.warn('Firestore query restricted, moving to demo bypass:', permErr.message);
                        }

                        if (!userData) {
                            // DEMO BYPASS: Allow access for development/testing
                            const demoData = {
                                'marketing.mgr@hrflow.com': { name: 'Marketing Manager', role: 'manager', departmentId: 'marketing' },
                                'finance.mgr@hrflow.com': { name: 'Finance Manager', role: 'manager', departmentId: 'finance' },
                                'hr.mgr@hrflow.com': { name: 'HR Manager', role: 'manager', departmentId: 'hr' },
                                'engineering.mgr@hrflow.com': { name: 'Engineering Manager', role: 'manager', departmentId: 'engineering' },
                                'admin@hrflow.com': { name: 'System Admin', role: 'admin', departmentId: 'all' }
                            };
                            
                            const lowercaseEmail = email.toLowerCase();
                            if (demoData[lowercaseEmail]) {
                                userData = demoData[lowercaseEmail];
                                userData.uid = 'demo_' + lowercaseEmail.split('@')[0];
                                console.log('✅ Demo bypass (Hardcoded) successful');
                            } else if (lowercaseEmail.includes('.mgr@') || lowercaseEmail.includes('manager') || lowercaseEmail === 'mgr@hrflow.com') {
                                // Dynamic Demo Bypass: ONLY for manager patterns
                                userData = { 
                                    name: email.split('@')[0].split('.').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' '), 
                                    role: 'manager', 
                                    departmentId: lowercaseEmail.includes('marketing') ? 'marketing' : 
                                                 lowercaseEmail.includes('finance') ? 'finance' : 
                                                 lowercaseEmail.includes('engineering') ? 'engineering' : 'hr'
                                };
                                userData.uid = 'demo_' + Date.now();
                                console.log('✅ Dynamic manager demo bypass successful');
                            } else if (lowercaseEmail === 'admin@hrflow.com') {
                                // Admin Bypass in Manager Portal (Will be caught by role check below)
                                userData = { name: 'System Admin', role: 'admin', departmentId: 'all' };
                                userData.uid = 'demo_admin';
                            } else if (lowercaseEmail.includes('emp') || (lowercaseEmail.includes('hrflow.com') && !lowercaseEmail.includes('mgr'))) {
                                // Employee identified in Manager Portal bypass
                                userData = { name: 'Employee User', role: 'employee', departmentId: 'general' };
                                userData.uid = 'demo_emp_restricted';
                            } else {
                                throw firebaseErr;
                            }
                        }
                    }
                }
                if (!userData) throw new Error('Manager record not synchronized. Please contact System Admin.');

                const role = (userData.role || '').toLowerCase();
                const dept = (userData.departmentId || userData.department || '').toLowerCase();

                // CRITICAL: RESTRICT TO MANAGERS ONLY
                if (role !== 'manager') {
                    const article = ['a', 'e', 'i', 'o', 'u'].includes(role[0]) ? 'an' : 'a';
                    const portalName = (role === 'admin' || role === 'super admin') ? 'Admin Portal' : 'Employee Portal';
                    throw new Error(`Access Denied: You are registered as ${article} ${role}. Please log in via the ${portalName}.`);
                }

                console.log('✅ Manager login successful for:', email);

                localStorage.setItem('hr_logged_in', 'true');
                localStorage.setItem('hr_user_id', userData.uid || userData.employeeId || 'unknown');
                localStorage.setItem('userRole', role);
                localStorage.setItem('userDept', dept);
                localStorage.setItem('userName', userData.name);

                let targetPage = 'HR-Manager-Dashboard.html'; // Fallback

                if (dept === 'marketing') targetPage = 'Marketing-Manager-Dashboard.html';
                else if (dept === 'engineering') targetPage = 'Engineering-Manager-Dashboard.html';
                else if (dept === 'finance') targetPage = 'Finance-Manager-Dashboard.html';
                else if (dept === 'sales') targetPage = 'Sales-Manager-Dashboard.html';
                else if (dept === 'operations' || dept === 'operational') targetPage = 'Operational-Manager-Dashboard.html';
                else if (dept === 'hr') targetPage = 'HR-Manager-Dashboard.html';
                else targetPage = 'Operational-Manager-Dashboard.html'; // Default to Operational if unknown but manager

                window.location.href = targetPage;
            } catch (err) {
                if (err.message.includes('Access Denied')) {
                    showAlert('Access Restricted', err.message, 'shield-alert');
                } else {
                    console.error('Login error detail:', err);
                    const msg = err.message.includes('Access Denied') ? err.message : 'Invalid credentials. Please verify your email and password.';
                    errorEl.textContent = msg;
                    errorEl.style.display = 'block';
                }
            } finally {
                btn.disabled = false;
                btn.querySelector('span').textContent = 'Enter Dashboard';
            }
        });

        if (window.lucide) { lucide.createIcons(); } else { console.error("Lucide failed to load"); }
    </script>
  <script src="status-widget.js"></script>
</body>
</html>
