<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Wizard | HRFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
        }

        .wizard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Progress Header */
        .progress-header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin: 0 2rem;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--primary);
        }

        .completion-pct { font-weight: 800; color: var(--primary); font-size: 1.25rem; }

        /* Form Card */
        .form-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .step-indicator {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            display: block;
        }

        h2 { font-size: 2rem; font-weight: 800; margin-bottom: 2rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group.full { grid-column: span 2; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .form-group input, .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); }

        .btn-row {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-next { background: var(--primary); color: white; box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5); }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.6); }
        .btn-back { background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); }
        .btn-back:hover { color: white; background: rgba(255,255,255,0.05); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
            .wizard-container { padding: 1rem; }
            .form-card { padding: 1.5rem; }
        }

        /* Success Overlay */
        #successScreen {
            display: none;
            text-align: center;
            padding: 4rem 2rem;
        }
    </style>
</head>
<body>

    <div class="wizard-container" id="wizardBody">
        <header class="progress-header">
            <div id="currentStepName" style="font-weight: 700; font-size: 0.9rem; min-width: 150px;">Step 1: Personal</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="completion-pct" id="pctLabel">0%</div>
        </header>

        <div class="form-card">
            <span class="step-indicator" id="stepCounter">Phase 01 of 08</span>
            <h2 id="stepTitle">Personal Profile</h2>
            
            <form id="wizardForm">
                <div id="formContent" class="form-grid">
                    <!-- Dynamic fields will be injected here -->
                </div>

                <div class="btn-row">
                    <button type="button" class="btn btn-back" id="btnBack"><i data-lucide="chevron-left"></i> Previous</button>
                    <button type="button" class="btn btn-next" id="btnNext">Save & Continue <i data-lucide="chevron-right"></i></button>
                </div>
            </form>
        </div>
    </div>

    <div class="wizard-container" id="successScreen">
        <div style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 32px; padding: 4rem;">
            <div style="width: 80px; height: 80px; background: #10b981; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: white;">
                <i data-lucide="party-popper" size="40"></i>
            </div>
            <h2>Onboarding Complete!</h2>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Your digital dossier has been submitted for final verification. You will receive access credentials once the IT team provisions your assets.</p>
            <button class="btn btn-next" style="margin: 0 auto;" onclick="window.location.href='login.html'">Go to Dashboard</button>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        lucide.createIcons();

        let currentStepIdx = 0;
        let flowSteps = [];
        let formData = {};
        const empId = new URLSearchParams(window.location.search).get('id') || 'demo_emp';

        async function initWizard() {
            try {
                // 1. Fetch Template
                const templateSnap = await getDoc(doc(db, 'onboarding_templates', 'default_enterprise_flow'));
                flowSteps = templateSnap.exists() ? templateSnap.data().steps : [
                    { type: 'personal', name: 'Personal Profile' },
                    { type: 'address', name: 'Residence Details' },
                    { type: 'government', name: 'Identity Proofs' },
                    { type: 'bank', name: 'Bank Details' }
                ];

                // 2. Load Draft Data
                const draft = localStorage.getItem(`onboarding_draft_${empId}`);
                if (draft) formData = JSON.parse(draft);

                renderStep();
            } catch (err) {
                console.error(err);
                alert("Failed to load onboarding sequence.");
            }
        }

        function renderStep() {
            const step = flowSteps[currentStepIdx];
            document.getElementById('currentStepName').innerText = `Step ${currentStepIdx + 1}: ${step.name}`;
            document.getElementById('stepTitle').innerText = step.name;
            document.getElementById('stepCounter').innerText = `Phase ${String(currentStepIdx + 1).padStart(2, '0')} of ${String(flowSteps.length).padStart(2, '0')}`;
            
            const pct = Math.round((currentStepIdx / flowSteps.length) * 100);
            document.getElementById('progressFill').style.width = `${pct}%`;
            document.getElementById('pctLabel').innerText = `${pct}%`;

            renderFields(step.type);
            document.getElementById('btnBack').style.visibility = currentStepIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('btnNext').innerHTML = currentStepIdx === flowSteps.length - 1 ? 'Finalize Onboarding <i data-lucide="check"></i>' : 'Save & Continue <i data-lucide="chevron-right"></i>';
            lucide.createIcons();
        }

        function renderFields(type) {
            const content = document.getElementById('formContent');
            let html = '';

            switch(type) {
                case 'personal':
                    html = `
                        <div class="form-group"><label>Full Legal Name</label><input type="text" name="fullName" required value="${formData.fullName || ''}"></div>
                        <div class="form-group"><label>Date of Birth</label><input type="date" name="dob" required value="${formData.dob || ''}"></div>
                        <div class="form-group"><label>Gender</label><select name="gender"><option>Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
                        <div class="form-group"><label>Nationality</label><input type="text" name="nationality" value="${formData.nationality || ''}"></div>
                    `;
                    break;
                case 'address':
                    html = `
                        <div class="form-group full"><label>Permanent Address</label><input type="text" name="addr_perm" value="${formData.addr_perm || ''}"></div>
                        <div class="form-group"><label>City</label><input type="text" name="city" value="${formData.city || ''}"></div>
                        <div class="form-group"><label>Postal Code</label><input type="text" name="zip" value="${formData.zip || ''}"></div>
                    `;
                    break;
                case 'bank':
                    html = `
                        <div class="form-group full"><label>Account Holder Name</label><input type="text" name="bank_name" value="${formData.bank_name || ''}"></div>
                        <div class="form-group"><label>Account Number</label><input type="text" name="bank_acc" value="${formData.bank_acc || ''}"></div>
                        <div class="form-group"><label>IFSC / SWIFT Code</label><input type="text" name="bank_ifsc" value="${formData.bank_ifsc || ''}"></div>
                    `;
                    break;
                default:
                    html = `<div class="form-group full"><p style="color: var(--text-muted);">Please upload documents for ${type} in the next phase.</p></div>`;
            }

            content.innerHTML = html;
        }

        document.getElementById('btnNext').onclick = async () => {
            // Save current form data
            const inputs = document.querySelectorAll('#wizardForm input, #wizardForm select');
            inputs.forEach(i => formData[i.name] = i.value);
            localStorage.setItem(`onboarding_draft_${empId}`, JSON.stringify(formData));

            if (currentStepIdx < flowSteps.length - 1) {
                currentStepIdx++;
                renderStep();
            } else {
                await finalize();
            }
        };

        document.getElementById('btnBack').onclick = () => {
            if (currentStepIdx > 0) {
                currentStepIdx--;
                renderStep();
            }
        };

        import { codeEngine } from "./code-engine-service.js";

        async function finalize() {
            document.getElementById('btnNext').disabled = true;
            document.getElementById('btnNext').innerText = "Syncing with Enterprise Cloud...";
            
            try {
                // 1. Generate Employee Code
                const empDoc = await getDoc(doc(db, 'users', empId));
                const empData = empDoc.data();
                const type = (empData.employmentType || 'full-time').toLowerCase();
                const dept = empData.department || 'General';
                
                const generatedId = await codeEngine.generateCode(empId, type, dept);
                console.log(`🚀 Generated Employee ID: ${generatedId}`);

                // 2. Update Firestore
                await updateDoc(doc(db, 'users', empId), {
                    ...formData,
                    employeeId: generatedId,
                    onboardingStatus: "Completed",
                    status: "Completed",
                    onboardingCompletedAt: serverTimestamp()
                });

                document.getElementById('wizardBody').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                alert("Failed to finalize. Code engine might not be configured.");
                document.getElementById('btnNext').disabled = false;
            }
        }

        initWizard();
    </script>
</body>
</html>
