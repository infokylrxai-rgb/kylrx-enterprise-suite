<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Center | Kylrx AI</title>
  <meta name="description" content="Submit your direct reviews, suggestions, or bug reports to the Kylrx AI Admin Team." />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📣</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #eff6ff;
      --primary-soft: #dbeafe;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --success: #10b981;
      --shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.08), 0 8px 10px -6px rgba(59, 130, 246, 0.08);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Glassmorphism Card */
    .feedback-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      width: 100%;
      max-width: 600px;
      border-radius: 32px;
      padding: 3rem;
      box-shadow: var(--shadow);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-block {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-light);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      border: 1px solid var(--primary-soft);
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.7);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-main);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    /* Interactive Rating System */
    .rating-container {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      transition: all 0.2s ease;
    }

    .star-btn.active {
      color: #eab308;
      fill: #eab308;
      transform: scale(1.15);
    }

    .star-btn:hover {
      transform: scale(1.2);
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.35);
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .back-home:hover {
      color: var(--primary);
    }

    .back-home-top {
      align-self: flex-start;
      margin-bottom: 1.25rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      opacity: 0.8;
    }

    .back-home-top:hover {
      color: var(--primary);
      transform: translateX(-6px);
      opacity: 1;
    }

    /* Centered Custom Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: white;
      width: 90%;
      max-width: 400px;
      border-radius: 24px;
      padding: 2.5rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      animation: modalPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-icon-bg {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .modal-icon-bg.success {
      background: #ecfdf5;
      color: var(--success);
    }

    .modal-icon-bg.error {
      background: #fee2e2;
      color: #ef4444;
    }

    .modal-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 1.5rem;
    }

    .modal-btn:hover {
      background: var(--primary-dark);
    }
  </style>
</head>

<body>

  <div class="container-wrapper" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; padding: 1rem 0;">
    <a href="index.html" class="back-home-top">
      <i data-lucide="arrow-left" size="18"></i> Back to Home
    </a>
    <div class="feedback-card">
    <div class="header-block">
      <div class="brand-badge">
        <i data-lucide="award" size="14"></i> Kylrx AI Enterprise
      </div>
      <h1>Share Your Feedback</h1>
      <p class="subtitle">Help us improve the Kylrx AI automated operations ecosystem by submitting your reviews, suggestions, or bug reports.</p>
    </div>

    <form id="feedbackForm">
      <div class="input-row">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@kylrxai.com" required />
        </div>
      </div>

      <div class="input-row">
        <div class="form-group">
          <label for="role">Your Role</label>
          <select id="role">
            <option value="Employee">Employee</option>
            <option value="Manager">Department Manager</option>
            <option value="Client">Client</option>
            <option value="Visitor">Visitor</option>
          </select>
        </div>
        <div class="form-group">
          <label for="feedbackType">Feedback Type</label>
          <select id="feedbackType">
            <option value="Suggestion">Suggestion</option>
            <option value="Bug Report">Bug Report</option>
            <option value="General Review">General Review</option>
            <option value="Praise">Praise</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Overall Experience Rating</label>
        <div class="rating-container" id="ratingContainer">
          <button type="button" class="star-btn" data-value="1"><i data-lucide="star" size="28"></i></button>
          <button type="button" class="star-btn" data-value="2"><i data-lucide="star" size="28"></i></button>
          <button type="button" class="star-btn" data-value="3"><i data-lucide="star" size="28"></i></button>
          <button type="button" class="star-btn" data-value="4"><i data-lucide="star" size="28"></i></button>
          <button type="button" class="star-btn" data-value="5"><i data-lucide="star" size="28"></i></button>
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Feature suggestion / Bug report detail" required />
      </div>

      <div class="form-group">
        <label for="message">Detailed Feedback Message</label>
        <textarea id="message" rows="4" placeholder="Describe your experience in detail..." required></textarea>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">
        <i data-lucide="send"></i> Submit Feedback
      </button>
    </form>

  </div>
</div>

  <!-- Centered Custom Alert Modal -->
  <div id="alertModal" class="modal-overlay">
    <div class="modal">
      <div id="modalIconBg" class="modal-icon-bg success">
        <i id="modalIcon" data-lucide="check-circle" size="32"></i>
      </div>
      <h2 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; color: #1e293b;" id="modalTitle">Submission Successful</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;" id="modalDesc">Description</p>
      <button class="modal-btn" onclick="closeModal()">Dismiss</button>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // Formspree Integration Endpoint
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/mjgzevdq";

    let ratingValue = 5;

    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      setupRatingSystem();
    });

    function setupRatingSystem() {
      const stars = document.querySelectorAll('.star-btn');
      stars.forEach((star, index) => {
        // Set initial state
        if (index < ratingValue) star.classList.add('active');
        
        star.addEventListener('click', () => {
          ratingValue = index + 1;
          stars.forEach((s, idx) => {
            if (idx < ratingValue) {
              s.classList.add('active');
            } else {
              s.classList.remove('active');
            }
          });
        });
      });
    }

    window.closeModal = () => {
      document.getElementById('alertModal').style.display = 'none';
      document.getElementById('feedbackForm').reset();
      ratingValue = 5;
      const stars = document.querySelectorAll('.star-btn');
      stars.forEach(s => s.classList.add('active'));
    };

    window.showCustomModal = (title, message, isSuccess = true) => {
      const modal = document.getElementById('alertModal');
      const iconBg = document.getElementById('modalIconBg');
      const icon = document.getElementById('modalIcon');
      const titleEl = document.getElementById('modalTitle');
      const descEl = document.getElementById('modalDesc');

      titleEl.textContent = title;
      descEl.textContent = message;

      if (isSuccess) {
        iconBg.className = 'modal-icon-bg success';
        icon.setAttribute('data-lucide', 'check-circle');
      } else {
        iconBg.className = 'modal-icon-bg error';
        icon.setAttribute('data-lucide', 'alert-circle');
      }

      modal.style.display = 'flex';
      if (window.lucide) lucide.createIcons();
    };

    document.getElementById('feedbackForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const origText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Submitting...';
      if (window.lucide) lucide.createIcons();

      const payload = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        role: document.getElementById('role').value,
        feedbackType: document.getElementById('feedbackType').value,
        rating: ratingValue,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
        submittedAt: serverTimestamp()
      };

      try {
        // 1. Submit to Firestore feedbacks collection
        await addDoc(collection(db, 'feedbacks'), payload);

        // 2. Dispatch Live Formspree Email Alert
        try {
          console.log(`[EMAIL] Dispatching feedback alert via Formspree...`);
          await fetch(FORMSPREE_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              name: payload.fullName,
              email: payload.email,
              role: payload.role,
              feedbackType: payload.feedbackType,
              rating: `${payload.rating} Stars`,
              subject: payload.subject,
              message: payload.message
            })
          });
        } catch (mailErr) {
          console.warn('[EMAIL] Formspree notification failed:', mailErr);
        }

        showCustomModal("Feedback Received", "Thank you! Your feedback has been successfully logged to Firebase and dispatched to the Admin team.", true);
      } catch (err) {
        console.error('Submission failed:', err);
        showCustomModal("Submission Failed", "Failed to register feedback in Firebase. " + err.message, false);
      } finally {
        btn.disabled = false;
        btn.innerHTML = origText;
        if (window.lucide) lucide.createIcons();
      }
    };
  </script>
</body>

</html>
