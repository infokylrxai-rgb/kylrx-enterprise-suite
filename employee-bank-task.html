<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Verification | HRFlow Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f0f9ff;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
        }

        .task-card {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.08);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .task-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .icon-box {
            width: 80px; height: 80px;
            background: rgba(59, 130, 246, 0.08);
            color: var(--primary);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; }

        .status-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .status-review { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .status-approved { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-rejected { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Form */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: 0.3s;
            font-weight: 500;
        }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); }

        /* Timeline */
        .timeline {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .timeline-item {
            display: flex;
            gap: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .timeline-marker { width: 8px; height: 8px; border-radius: 50%; background: var(--border); margin-top: 6px; flex-shrink: 0; }
        .timeline-marker.active { background: var(--primary); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); }

        .rejection-box {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            color: var(--danger);
            font-size: 0.9rem;
        }

        /* Status Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        .status-modal {
            background: white; padding: 2.5rem; border-radius: 32px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid var(--border); transform: scale(0.9);
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .status-modal { transform: scale(1); }
        .modal-icon {
            width: 64px; height: 64px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 1.5rem;
        }
        .modal-icon.success { background: #dcfce7; color: #10b981; }
        .modal-icon.error { background: #fee2e2; color: #ef4444; }
        
        .modal-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; }
        .modal-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
        .modal-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .modal-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="task-card">
        <div class="task-header">
            <div class="icon-box"><i data-lucide="shield-check" size="32"></i></div>
            <h1>Bank Verification</h1>
            <p class="subtitle">Please review and confirm your salary disbursement details.</p>
        </div>

        <div class="status-strip">
            <span style="font-size: 0.85rem; font-weight: 600;">Status</span>
            <span class="status-pill status-pending" id="statusLabel">Pending Review</span>
        </div>

        <div id="rejectionMsg" class="rejection-box" style="display: none;">
            <div style="font-weight: 800; margin-bottom: 4px;">Admin Feedback:</div>
            <div id="feedbackText">Invalid routing number provided. Please check and resubmit.</div>
        </div>

        <form id="bankForm">
            <div class="form-group">
                <label>Bank Name</label>
                <input type="text" id="bankName" placeholder="e.g. JPMorgan Chase" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNum" placeholder="1234567890" required>
            </div>
            <div class="form-group">
                <label>Routing / IFSC Code</label>
                <input type="text" id="routingCode" placeholder="ABC0012345" required>
            </div>

            <button type="submit" class="btn btn-primary" id="btnSubmit">
                Submit for Verification <i data-lucide="send" size="18"></i>
            </button>
        </form>

        <div class="timeline" id="timeline">
            <p style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 1rem;">Verification Timeline</p>
            <div id="timelineItems">
                <div class="timeline-item">
                    <div class="timeline-marker active"></div>
                    <div>
                        <div style="font-weight: 700;">Task Created</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem;">May 10, 2026 • 12:00 PM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Modal Overlay -->
    <div class="modal-overlay" id="statusModalOverlay">
        <div class="status-modal">
            <div class="modal-icon success" id="statusModalIcon"><i data-lucide="check-circle"></i></div>
            <h2 class="modal-title" id="statusModalTitle">Submission Success</h2>
            <p class="modal-desc" id="statusModalDesc">Message content goes here.</p>
            <button class="modal-btn" onclick="closeStatusModal()">Dismiss</button>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { submitBankDetails } from "./bank-verification-service.js";

        lucide.createIcons();

        const empId = new URLSearchParams(window.location.search).get('id') || 'demo_emp';
        const form = document.getElementById('bankForm');
        const statusLabel = document.getElementById('statusLabel');
        const rejectionMsg = document.getElementById('rejectionMsg');
        const feedbackText = document.getElementById('feedbackText');

        // Modal Logic
        window.showStatusModal = (title, msg, type = 'success') => {
            const overlay = document.getElementById('statusModalOverlay');
            const icon = document.getElementById('statusModalIcon');
            const titleEl = document.getElementById('statusModalTitle');
            const descEl = document.getElementById('statusModalDesc');

            titleEl.textContent = title;
            descEl.textContent = msg;
            
            icon.className = `modal-icon ${type}`;
            icon.innerHTML = type === 'success' ? '<i data-lucide="check-circle"></i>' : '<i data-lucide="x-circle"></i>';
            
            overlay.classList.add('active');
            lucide.createIcons();
        };

        window.closeStatusModal = () => {
            document.getElementById('statusModalOverlay').classList.remove('active');
            window.location.reload();
        };

        async function loadStatus() {
            const snap = await getDoc(doc(db, 'bank_verifications', empId));
            if (snap.exists()) {
                const data = snap.data();
                
                // Update UI based on status
                statusLabel.innerText = data.status;
                statusLabel.className = `status-pill status-${data.status.toLowerCase().replace(' ', '-')}`;
                
                document.getElementById('bankName').value = data.bankName || '';
                document.getElementById('accountNum').value = data.accountNum || '';
                document.getElementById('routingCode').value = data.routingCode || '';

                if (data.status === 'Rejected') {
                    rejectionMsg.style.display = 'block';
                    feedbackText.innerText = data.adminFeedback || 'No reason provided.';
                    document.getElementById('btnSubmit').innerText = 'Resubmit for Approval';
                } else if (data.status === 'Under Review' || data.status === 'Approved') {
                    // Disable form if pending review or approved
                    Array.from(form.elements).forEach(el => el.disabled = true);
                    document.getElementById('btnSubmit').style.display = 'none';
                }

                // Render Timeline
                renderTimeline(data);
            }
        }

        function renderTimeline(data) {
            const items = document.getElementById('timelineItems');
            let html = `
                <div class="timeline-item">
                    <div class="timeline-marker active"></div>
                    <div>
                        <div style="font-weight: 700;">Details Submitted</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem;">${data.submittedAt?.toDate().toLocaleString() || 'Just now'}</div>
                    </div>
                </div>
            `;
            if (data.reviewedAt) {
                html += `
                    <div class="timeline-item">
                        <div class="timeline-marker active"></div>
                        <div>
                            <div style="font-weight: 700;">HR Review: ${data.status}</div>
                            <div style="color: var(--text-muted); font-size: 0.75rem;">${data.reviewedAt?.toDate().toLocaleString()}</div>
                        </div>
                    </div>
                `;
            }
            items.innerHTML = html;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Processing...';
            lucide.createIcons();

            const details = {
                bankName: document.getElementById('bankName').value,
                accountNum: document.getElementById('accountNum').value,
                routingCode: document.getElementById('routingCode').value
            };

            try {
                await submitBankDetails(empId, details);
                showStatusModal(
                    'Details Submitted',
                    'Your bank details have been successfully synchronized with the finance cloud. Our team will verify them within 24 hours.',
                    'success'
                );
            } catch (err) {
                console.error(err);
                showStatusModal(
                    'Submission Failed',
                    'An error occurred during secure synchronization. Please check your network and try again.',
                    'error'
                );
                btn.disabled = false;
                btn.innerHTML = 'Submit for Verification <i data-lucide="send" size="18"></i>';
            }
        };

        loadStatus();
    </script>
</body>
</html>
