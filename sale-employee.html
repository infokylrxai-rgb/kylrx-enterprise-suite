<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Workspace | HRFlow Enterprise</title>
    <!-- Robust CSP to fix the "default-src none" error -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.gstatic.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com http://localhost:3000 http://127.0.0.1:3000 https://unpkg.com https://cdn.jsdelivr.net; frame-src 'self' https://planning-with-ai-c026b.firebaseapp.com https://apis.google.com;">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        p { color: var(--text-muted); font-size: 1.1rem; }

        .loading-bar {
            width: 240px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 2.5rem auto;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: var(--primary);
            border-radius: 10px;
            animation: moveProgress 2s infinite ease-in-out;
        }

        @keyframes moveProgress {
            0% { left: -30%; width: 30%; }
            50% { width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        .status-tag {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo-box">
            <i data-lucide="layers" color="white" size="40"></i>
        </div>
        <h1 id="statusTitle">Syncing Workspace</h1>
        <p id="statusMsg">Connecting to enterprise services...</p>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>

        <div class="status-tag">
            <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: blink 1.5s infinite;"></div>
            Zero-Crash Security Active
        </div>
    </div>

    <script>
        // Initialize Lucide
        if (window.lucide) { lucide.createIcons(); } else { console.error("Lucide failed to load"); }

        // Smart Redirection Logic
        setTimeout(() => {
            const role = (localStorage.getItem('userRole') || '').toLowerCase();
            const dept = (localStorage.getItem('userDept') || '').toLowerCase();
            const isLoggedIn = localStorage.getItem('hr_logged_in') === 'true';

            if (!isLoggedIn) {
                document.getElementById('statusTitle').textContent = 'Session Expired';
                document.getElementById('statusMsg').textContent = 'Redirecting to login...';
                setTimeout(() => window.location.href = 'employee-login.html', 1000);
                return;
            }

            if (role !== 'employee') {
                document.getElementById('statusTitle').textContent = 'Access Restricted';
                document.getElementById('statusMsg').textContent = 'Redirecting to your authorized portal...';
                setTimeout(() => {
                    window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'manager-auth.html';
                }, 1500);
                return;
            }

            document.getElementById('statusTitle').textContent = 'Workspace Ready';
            document.getElementById('statusMsg').textContent = `Loading ${dept.charAt(0).toUpperCase() + dept.slice(1)} Dashboard...`;

            let targetPage = 'hr-employee.html'; // Default

            const routes = {
                'marketing': 'marketing-employee.html',
                'engineering': 'engineering-employee.html',
                'finance': 'finance-employee.html',
                'sales': 'sales-employee.html',
                'operations': 'operational-employee.html',
                'operational': 'operational-employee.html',
                'hr': 'hr-employee.html'
            };

            targetPage = routes[dept] || 'hr-employee.html';

            setTimeout(() => {
                window.location.href = targetPage;
            }, 800);
        }, 1500);
    </script>
</body>
</html>
