<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – HRFlow Automation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.gstatic.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com http://localhost:3000 http://127.0.0.1:3000 https://unpkg.com https://cdn.jsdelivr.net; frame-src 'self' https://planning-with-ai-c026b.firebaseapp.com https://apis.google.com;">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <a href="index.html" class="logo">
          <div class="logo-icon"><i data-lucide="users"></i></div>
          <span class="logo-text">HRFlow</span>
        </a>
        <h1>Welcome Back</h1>
        <p>Please enter your credentials to continue</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i data-lucide="mail" class="icon-sm"></i>
            <input type="email" id="email" placeholder="admin@hrflow.com" required>
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="javascript:void(0)" class="forgot-link" onclick="alert('Please contact the System Administrator to reset your admin credentials.')">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <i data-lucide="lock" class="icon-sm"></i>
            <input type="password" id="password" placeholder="••••" required>
          </div>
        </div>

        <div id="errorMessage" class="error-msg">Invalid login credentials</div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span>Login to Dashboard</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <div class="login-footer">
        <p>New Admin? <a href="signup.html">Create Admin Account</a></p>
      </div>
    </div>
    
    <div class="bg-shape shape-2"></div>
  </div>

  <!-- Custom Alert Overlay -->
  <div id="customOverlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.4); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:9999;">
    <div id="alertCard" style="background:white; padding:2.5rem; border-radius:24px; width:90%; max-width:400px; text-align:center; border:1px solid #dbeafe; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); transition: all 0.3s ease;">
      <div id="alertIcon" style="font-size:2.5rem; color:#ef4444; margin-bottom:1.5rem;"></div>
      <h2 id="alertTitle" style="font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; color:#0f172a;">Access Restricted</h2>
      <p id="alertMsg" style="color:#64748b; margin-bottom:2rem; line-height:1.6;"></p>
      <button id="alertBtn" onclick="document.getElementById('customOverlay').style.display='none'" style="background:#2563eb; color:white; width:100%; padding:1rem; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Understood</button>
    </div>
  </div>

  <script type="module" src="login.js"></script>
  <script>if (window.lucide) { lucide.createIcons(); } else { console.error("Lucide failed to load"); }</script>
</body>
</html>
