<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // The Support Hub has been removed. 
        // Redirecting any active tabs back to the Manager Dashboard.
        const urlParams = new URLSearchParams(window.location.search);
        const centerId = urlParams.get('id');
        window.location.replace(centerId ? `manager-dashboard.html?id=${centerId}` : 'manager-dashboard.html');
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        The Support Hub has been removed. Redirecting you to the dashboard...
    </p>
</body>
</html>
