<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Kylrx AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.03) 0px, transparent 50%);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 3.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 3rem; }
        .logo-icon { width: 64px; height: 64px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2); }
        h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 16px 16px 48px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: 0.3s;
            font-weight: 500;
        }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            margin-top: 1.5rem;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }

        .footer-links { text-align: center; margin-top: 3rem; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* Centered Status Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        .status-modal {
            background: white; padding: 2.5rem; border-radius: 32px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid var(--border); transform: scale(0.9);
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .status-modal { transform: scale(1); }
        .modal-icon {
            width: 64px; height: 64px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 1.5rem;
        }
        .modal-icon.error { background: #fee2e2; color: #ef4444; }
        .modal-icon.success { background: #dcfce7; color: #10b981; }
        .modal-icon.info { background: #dbeafe; color: #3b82f6; }
        
        .modal-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .modal-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; font-weight: 500; }
        .modal-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .modal-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <div class="logo-icon"><i data-lucide="user"></i></div>
            <h1>Employee Portal</h1>
            <p class="subtitle">Welcome back to Kylrx AI Enterprise</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" size="18"></i>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" size="18"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <div class="footer-links">
            <p>Don't have access? <a href="#" onclick="showStatusModal('Employee Access Help', 'Authorized Demo Access:\n- Employee: john@gmail.com\n- Password: UNIT-CYB-937-Employee-John@2026!', 'info')">Help</a></p>
            <p style="margin-top: 1.5rem;"><a href="index.html" style="color: var(--text-muted); font-weight: 600;">← Back to Gateway</a></p>
        </div>
    </div>

    <!-- Status Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="status-modal">
            <div class="modal-icon" id="modalIcon"><i data-lucide="alert-circle"></i></div>
            <h2 class="modal-title" id="modalTitle">Status</h2>
            <p class="modal-desc" id="modalDesc" style="white-space: pre-line;"></p>
            <button class="modal-btn" onclick="closeStatusModal()">Dismiss</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        // Modal Logic
        window.showStatusModal = (title, msg, type = 'info') => {
            const overlay = document.getElementById('modalOverlay');
            const icon = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const descEl = document.getElementById('modalDesc');

            titleEl.textContent = title;
            descEl.textContent = msg;
            
            icon.className = `modal-icon ${type}`;
            icon.innerHTML = type === 'success' ? '<i data-lucide="check-circle"></i>' : 
                            (type === 'error' ? '<i data-lucide="x-circle"></i>' : '<i data-lucide="info"></i>');
            
            overlay.classList.add('active');
            lucide.createIcons();
        };

        window.closeStatusModal = () => {
            document.getElementById('modalOverlay').classList.remove('active');
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const lowercaseEmail = email.toLowerCase();
            
            console.log("Attempting employee login for:", lowercaseEmail);

            const originalBtnText = loginBtn.textContent;
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;

            let userData = null;
            let userId = null;

            try {
                // --- Strategy 1: Direct Firestore Lookup (Real Backend Check) ---
                try {
                    const q = query(collection(db, 'users'), where('email', '==', lowercaseEmail));
                    const snap = await getDocs(q);
                    
                    if (!snap.empty) {
                        const potential = snap.docs[0].data();
                        // Verify password against Firestore record
                        if (potential.password === password || potential.tempPassword === password) {
                            userData = potential;
                            userId = snap.docs[0].id;
                            console.log("✅ Firestore backend authentication successful");
                        }
                    }
                } catch (fsError) {
                    console.warn("Firestore lookup failed:", fsError);
                }

                // --- Strategy 2: Firebase Auth ---
                if (!userData) {
                    try {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        userId = userCredential.user.uid;
                        const userDoc = await getDoc(doc(db, 'users', userId));
                        if (userDoc.exists()) userData = userDoc.data();
                        console.log("✅ Firebase Auth successful");
                    } catch (authError) {
                        console.warn("Firebase Auth failed, trying Strategy 3...");
                    }
                }

                // --- Strategy 3: Demo Bypass (Fallback for Development) ---
                if (!userData) {
                    // Check if they are trying to use a manager or admin demo credential in the employee portal
                    const isManagerEmail = 
                        lowercaseEmail === 'nandan.b@gmail.com' ||
                        lowercaseEmail === 'cyber@gmail.com' ||
                        lowercaseEmail.includes('mgr') ||
                        lowercaseEmail.includes('manager');
                    
                    const isAdminEmail = 
                        lowercaseEmail === 'admin@hrflow.com' ||
                        lowercaseEmail === 'admin@kylrx.ai' ||
                        lowercaseEmail === 'admin@demo.com' ||
                        lowercaseEmail.includes('admin') ||
                        lowercaseEmail.includes('sysadmin') ||
                        lowercaseEmail.includes('hrms');

                    if (isManagerEmail) {
                        showStatusModal('Access Denied', 'These credentials belong to a Manager. Please log in via the Manager Portal.', 'error');
                        loginBtn.textContent = originalBtnText;
                        loginBtn.disabled = false;
                        return;
                    }

                    if (isAdminEmail) {
                        showStatusModal('Access Denied', 'These credentials belong to an Administrator. Please log in via the Admin/HRMS Portal.', 'error');
                        loginBtn.textContent = originalBtnText;
                        loginBtn.disabled = false;
                        return;
                    }

                    const isBypassEmail = 
                        lowercaseEmail === 'john@gmail.com' ||
                        lowercaseEmail === 'dev@gmail.com' ||
                        lowercaseEmail === 'demo@gmail.com' ||
                        lowercaseEmail.includes('emp') ||
                        lowercaseEmail.includes('employee');

                    if (isBypassEmail) {
                        // Specific password check
                        if (lowercaseEmail === 'john@gmail.com') {
                            const correctPass = 'UNIT-CYB-937-Employee-John@2026!';
                            if (password !== correctPass && password !== 'demo123') {
                                throw new Error('Invalid Secure Token for this Corporate ID.');
                            }
                        }

                        let dept = 'Cybersecurity';
                        let role = 'employee';

                        userData = {
                            name: email.split('@')[0].toUpperCase(),
                            role: role,
                            department: dept
                        };
                        userId = 'demo_emp_' + Date.now();
                        console.log("✅ Demo Bypass triggered for:", lowercaseEmail);

                        // Auto-provision in Firestore
                        try {
                            await setDoc(doc(db, 'users', userId), {
                                ...userData,
                                email: lowercaseEmail,
                                password: password,
                                createdAt: serverTimestamp()
                            }, { merge: true });
                            console.log("✅ Provisioned new employee record in Firebase");
                        } catch (provisionErr) {
                            console.warn("Auto-provisioning failed:", provisionErr);
                        }
                    }
                }

                if (userData) {
                    const role = (userData.role || '').toLowerCase();
                    if (role === 'employee') {
                        localStorage.setItem('employee_uid', userId);
                        localStorage.setItem('userName', userData.name || email.split('@')[0]);
                        localStorage.setItem('userRole', role);
                        localStorage.setItem('userDept', (userData.department || userData.departmentId || 'General').toLowerCase());
                        
                        window.location.href = `employee-dashboard.html?id=${userData.departmentId || '6xpTjjcdEHyzMU1NuIBk'}`;
                    } else {
                        const article = ['a', 'e', 'i', 'o', 'u'].includes(role[0]) ? 'an' : 'a';
                        let portalName = 'Admin Portal';
                        if (role === 'manager') {
                            portalName = 'Manager Portal';
                        } else if (role === 'hrms' || role === 'admin' || role === 'super admin') {
                            portalName = 'Admin or HRMS Portal';
                        }
                        showStatusModal('Access Denied', `You are registered as ${article} ${role}. Please log in via the ${portalName}.`, 'error');
                        loginBtn.textContent = originalBtnText;
                        loginBtn.disabled = false;
                    }
                } else {
                    throw new Error('Invalid credentials. Please verify your Email and Password.');
                }

            } catch (error) {
                console.error("Login Error:", error);
                showStatusModal('Authentication Failed', error.message || 'Invalid credentials. Please try again.', 'error');
                loginBtn.textContent = originalBtnText;
                loginBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
